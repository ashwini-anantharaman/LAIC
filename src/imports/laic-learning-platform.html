,{id:"q2",type:"multiple_choice",difficulty:2,prompt:"Holding a phone number in mind for seconds before dialing uses\u2026",options:[{id:"a",text:"episodic memory",correct:!1,feedback:"That's for personal events."},{id:"b",text:"working memory",correct:!0,feedback:"Correct \u2014 brief, limited, PFC-coordinated."},{id:"c",text:"procedural memory",correct:!1,feedback:"That's for skills."}],explanation:"Working memory holds small amounts briefly; it decays in seconds without rehearsal.",hint:"Short, limited, gone in seconds."},{id:"q3",type:"true_false",difficulty:1,prompt:"Long-term potentiation (LTP) weakens synaptic connections.",options:[{id:"t",text:"True",correct:!1,feedback:"That's LTD."},{id:"f",text:"False",correct:!0,feedback:"Correct \u2014 LTP strengthens synapses."}],explanation:"LTP strengthens synapses (esp. hippocampus); LTD weakens them.",hint:"Potentiation = strengthening."},{id:"q4",type:"multiple_choice",difficulty:2,prompt:"Moving through a familiar room, which cells mark your specific location?",options:[{id:"a",text:"grid cells",correct:!1,feedback:"Grid cells give coordinates."},{id:"b",text:"place cells",correct:!0,feedback:"Right \u2014 place cells (hippocampus)."},{id:"c",text:"concept cells",correct:!1,feedback:"Those encode ideas."}],explanation:"Place cells fire at specific locations; grid cells supply coordinates.",hint:"A spot, not a grid."},{id:"q5",type:"multiple_choice",difficulty:3,prompt:"During LTP, what does CREB do?",options:[{id:"a",text:"breaks down neurotransmitters",correct:!1,feedback:"That's enzymatic recycling."},{id:"b",text:"switches on genes that build lasting synaptic structure",correct:!0,feedback:"Yes \u2014 it acts in the nucleus on genes."},{id:"c",text:"blocks calcium entry",correct:!1,feedback:"Calcium entry triggers the cascade."}],explanation:"CREB turns on genes directing protein synthesis, stabilizing long-term change.",hint:"It works on genes."}],To=[{id:"f1",front:"Hippocampus",back:"Medial-temporal structure that turns new experiences into lasting declarative memories.",hint:"H.M.'s was removed."},{id:"f2",front:"Declarative memory",back:"Conscious memory for facts (semantic) and events (episodic).",hint:"You can describe it."},{id:"f3",front:"Working memory",back:"Temporary, limited store; decays in seconds without rehearsal.",hint:"A phone number."},{id:"f4",front:"Nondeclarative memory",back:"Skills and habits used without conscious recall.",hint:"Riding a bike."},{id:"f5",front:"Synaptic plasticity",back:"The synapse's ability to remodel \u2014 the physical basis of memory.",hint:"The gap that changes."},{id:"f6",front:"Long-term potentiation",back:"Lasting increase in synaptic strength; prominent in the hippocampus.",hint:"Volume up."},{id:"f7",front:"Amygdala",back:"Almond-shaped structure integrating emotion; central to fear.",hint:"Fight or flight."},{id:"f8",front:"Reward prediction error",back:"Dopamine responds to the gap between expected and actual reward.",hint:"Surprise matters."},{id:"f9",front:"Concept cells",back:"Temporal-lobe cells firing for one specific concept; basis of semantic memory.",hint:"One cell, one idea."},{id:"f10",front:"Executive function",back:"Inhibition + working memory + shifting; run by the prefrontal cortex.",hint:"The brain's CEO."},{id:"f11",front:"Broca's area",back:"Left frontal region vital for producing speech.",hint:"Patient 'Tan'."},{id:"f12",front:"Neurogenesis",back:"Birth of new neurons; occurs in the dentate gyrus of the adult hippocampus.",hint:"Rare in adults."}],K={l1:{hook:{title:"A man who lived every moment as his first",body:"In 1953 Henry Molaison (H.M.) had his medial temporal lobes removed to stop seizures. The seizures eased \u2014 but he could no longer form new conscious memories. He recalled his childhood, yet every new meal and conversation arrived as if for the first time."},concept:{concept:"Medial Temporal Lobe",plain:"Structures including the hippocampus that turn new experiences into lasting memories.",formal:"Works with the cortex to form, organize, consolidate, and retrieve memories.",everyday:"The brain's 'save' button for new facts and events.",misconception:"Not where memories live permanently \u2014 those spread across the cortex over time."},excerpt:{quote:"If Molaison met someone who then left the room, within minutes he had no recollection of the person or their meeting. He experienced every aspect of his daily life \u2014 eating a meal, taking a walk \u2014 as a first.",cite:"Brain Facts, Ch.4, p.32"},question:ne[0],reflection:{prompt:"Describe something you can do without thinking \u2014 riding a bike, typing. You can't explain the steps, yet your body remembers. What kind of memory is that?"},summary:"H.M.'s surgery removed his hippocampi, erasing his ability to form new conscious (declarative) memories while sparing skill learning \u2014 the founding evidence that memory is many systems, not one."},l2:{hook:{title:"Not one memory, but many",body:"H.M.'s case cracked open a bigger truth: memory is not one system. It divides into families \u2014 declarative (facts and events), working (a brief mental scratchpad), spatial (place and grid cells), and nondeclarative (skills) \u2014 each handled by different, interacting brain regions."},concept:{concept:"Working Memory",plain:"A temporary workspace holding a little information for seconds while you use it.",formal:"A short-term form of declarative memory, coordinated by the prefrontal cortex; limited in capacity and duration.",everyday:"Holding a phone number just long enough to dial it.",misconception:"Not a small long-term memory \u2014 without rehearsal it decays in seconds."},excerpt:{quote:"While the brain seems to possess unlimited capacity for long-term memories, short-term memories are limited to relatively small amounts of data for a limited amount of time.",cite:"Brain Facts, Ch.4, p.34"},question:ne[3],reflection:{prompt:"When do you rely most on working memory in a normal day \u2014 and when does it clearly run out of room?"},summary:"Memory splits into declarative (semantic + episodic), working, spatial, and nondeclarative systems \u2014 dissociable and region-specific."},l3:{hook:{title:"Where memory physically lives",body:"Zoom in far enough and a memory becomes physical. Your brain rewires itself at synapses \u2014 the tiny gaps where neurons pass signals. When you learn, these connections change in number, shape, and strength."},concept:{concept:"Synaptic Plasticity",plain:"The ability of synapses to remodel themselves \u2014 the physical basis of learning.",formal:"Persistent, experience-dependent changes in synaptic number, shape, transmitter release, and receptor density.",everyday:"A path worn into grass by repeated walking.",misconception:"Memories aren't tiny files; they're changes in how neurons connect."},excerpt:{quote:"Your brain is able to form memories and rewire itself in response to experience because circuits in your brain change at synapses \u2014 the tiny gaps across which neurons communicate. The ability of synapses to remodel themselves is called synaptic plasticity.",cite:"Brain Facts, Ch.4, p.35"},question:ne[4],reflection:{prompt:"Think of a skill you improved through repetition. How does 'synapses strengthening with use' fit what that felt like?"},summary:"Learning is physical: synapses remodel (LTP strengthens, LTD weakens), with calcium, NMDA/AMPA receptors, and CREB locking in lasting change."},l4:{hook:{title:"Feeling is a brain system",body:"Emotions aren't separate from the brain's machinery \u2014 they run on specific circuits. The amygdala integrates emotion and fear; the insula generates disgust and gut feelings; the periaqueductal gray handles pain and stress responses."},concept:{concept:"The Amygdala",plain:"A pair of almond-shaped structures that integrate emotion, especially fear.",formal:"Modulates fight-or-flight, interprets threat, identifies social rewards, central to classical conditioning.",everyday:"The jolt before you consciously register a loud noise.",misconception:"Not only a 'fear center' \u2014 it tags emotional significance of many kinds, including reward."},excerpt:{quote:"Surprisingly, it's not the reward itself, but the expectation of a reward that most powerfully influences the emotional reaction.",cite:"Brain Facts, Ch.4, p.37"},question:ne[1],reflection:{prompt:"Recall a reward that thrilled you more than its size warranted. Was the thrill partly that you didn't see it coming?"},summary:"Emotion runs on the amygdala, insula, and periaqueductal gray; dopamine tracks reward-prediction-error \u2014 surprise, not reward, drives the response."}};function fg(e,t){return K[e]||{hook:{title:t,body:`An introduction to ${t.toLowerCase()}, drawn from the source and framed for the learner.`},concept:{concept:t,plain:`The core idea of ${t.toLowerCase()} in plain language.`,formal:"A precise definition grounded in the source text.",everyday:"A familiar everyday analogy.",misconception:"The most common misunderstanding to correct."},excerpt:{quote:`A representative passage on ${t.toLowerCase()} would be quoted here, verbatim from the source.`,cite:"Brain Facts, Ch.5"},question:ne[2],reflection:{prompt:`How does ${t.toLowerCase()} show up in your own experience?`},summary:`A short recap of ${t.toLowerCase()}.`}}var T=({tone:e="bg-stone-100 text-stone-600",children:t,className:o=""})=>(0,a.jsx)("span",{className:`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium ${e} ${o}`,style:{fontFamily:u.body},children:t}),Bt=({s:e})=>(0,a.jsx)(T,{tone:eg[e]||"bg-stone-100 text-stone-600",children:String(e).replaceAll("_"," ")}),M=({children:e,onClick:t,kind:o="ghost",size:s="md",className:l="",disabled:n,title:r})=>{let i="inline-flex items-center justify-center gap-1.5 rounded-lg font-medium transition-colors select-none",d={sm:"px-2.5 py-1 text-xs",md:"px-3.5 py-1.5 text-sm",lg:"px-5 py-2.5 text-[15px]"},f={ink:"bg-slate-900 text-white hover:bg-sl lepsy. The operation removed much of the hippocampus on both sides of his brain. His seizures improved, but he was left unable to form new long-term memories.","H.M. could hold a thought for as long as he kept rehearsing it, yet minutes later he would forget it entirely. Remarkably, he could still learn new motor skills, even though he had no memory of ever practising them.","His case revealed that memory is not one system but several. Recalling facts and events \u2014 declarative memory \u2014 depends on the hippocampus, while skills and habits \u2014 nondeclarative memory \u2014 rely on other regions.","At the cellular level, learning changes the strength of connections between neurons. When two neurons fire together repeatedly, the synapse between them strengthens, a process called long-term potentiation."],ps7:["Henry Molaison (1926\u20132008) was studied for over five decades, making him one of the most important subjects in the history of neuroscience.","His working memory and language were intact. The deficit was specific: transferring new information into lasting memory.","Detailed testing showed preserved procedural learning. On the mirror-drawing task he improved day by day, even as he insisted he had never done it before."],ps8:["Memory systems overview: sensory, working, and long-term stores, each with different capacity and duration.","The hippocampus acts as an index, binding the elements of an experience so they can later be recalled together.","Emotional salience, signalled by the amygdala, shapes which memories are strengthened and retained."],ps1:["The mind operates in two modes. System 1 is fast, automatic, and intuitive; System 2 is slow, effortful, and deliberate.","Most of the time System 1 runs the show, and System 2 endorses its suggestions with little scrutiny.","This division explains many biases: when a quick, confident answer comes to mind, we rarely stop to check it."],ps2:["Confirmation bias is the tendency to seek, interpret, and remember information in a way that confirms one's prior beliefs.","It is not simply motivated reasoning; even neutral observers show it when testing hypotheses.","In the classic 2-4-6 task, people propose examples that fit their guessed rule rather than tests that could disprove it."],ps3:["The Wason selection task shows how rarely people look for disconfirming evidence.","Most participants turn over cards that could confirm the rule, not the ones that could break it."],ps4:["An everyday example: once you decide a coworker is unreliable, you notice every late reply and forget the prompt ones."],ps5:["The hosts walk through the Wason task and why seeking disconfirmation feels so unnatural to us."],ps9:["An opening bid of 1NT shows a balanced hand with 15 to 17 high-card points.","The Stayman convention lets responder ask opener for a four-card major after a 1NT opening.","Responder bids 2\u2663 as Stayman; opener replies 2\u2666 with no four-card major, or 2\u2665/2\u2660 to show one.","Stayman is used when responder holds a four-card major and enough strength to invite game."],_default:["This source has no preview text in the prototype. In production the original document renders here for highlighting.","Select sentences to mark them as use, support, ignore, or note, and add a comment in the margin."]},hm={bo1:[{type:"text",label:"Hook",body:"Bridge looks complicated, but the whole game of cards rests on two ideas: tricks and trumps. Get these and you can already play."},{type:"text",label:"Explanation \u2014 a trick",body:"A trick is one round where each of the four players plays a card. Whoever leads names the suit; everyone must follow suit if they can. The highest card of the suit led wins the trick \u2014 aces are high, twos are low. If you can't follow suit you may play any card, but a card of a different suit can't win the trick."},{type:"text",label:"Explanation \u2014 trumps",body:"At the start of each deal one suit can be named the trump \u2014 the 'boss' suit. If you're void in the suit led, you can play a trump, and any trump beats every card in the led suit. The highest trump played wins the trick. A deal can also be played in notrump, where there is no boss suit and the highest card of the led suit simply wins."},{type:"text",label:"Worked example",body:"Spades are trump. West leads the \u2665Q, North plays \u2665K, South plays \u2665A, East is out of hearts and plays the \u26602. Even though the \u26602 is a tiny card, it's a trump \u2014 so East wins the trick over the ace of hearts."},{type:"q",prompt:"Spades are trump. Hearts are led. A player void in hearts plays the \u26602, while others follow with the \u2665A, \u2665K, \u2665Q. Who wins?",options:[{t:"The \u2665A"},{t:"The \u26602 (a trump)",correct:!0},{t:"The \u2665K"},{t:"Nobody"}],exp:"A trump beats any card in the suit led. The lowly \u26602 out-ranks even the ace of hearts because spades are the boss suit."},{type:"text",label:"Summary",body:"Follow suit; highest card of the led suit wins \u2014 unless someone trumps, in which case the highest trump wins. Notrump means no boss suit. That's the engine of every deal."}],bo2:[{type:"text",label:"Intro",body:"A bridge deal has two phases: first the bidding (an auction), then the card play. Four players sit as two partnerships \u2014 North-South and East-West \u2014 sitting across from your partner."},{type:"text",label:"Explanation \u2014 the roles",body:"Once the auction ends, one player becomes the declarer \u2014 the one who first named the suit (or notrump) that became the final contract. Their partner becomes the dummy (from the French for 'silent'): after the opening lead, the dummy lays all 13 cards face-up and the declarer plays both hands. The other pair are the defenders."},{type:"text",label:"Explanation \u2014 the flow of a deal",body:"1) The player to the declarer's left makes the opening lead. 2) The dummy lays out their cards. 3) Players take tricks \u2014 highest card of the led suit, or highest trump, wins. 4) At the end, if the declaring side took at least as many tricks as it contracted for, it scores; otherwise the defenders score."},{type:"q",prompt:"Who lays their cards face-up on the table during the play?",options:[{t:"The declarer"},{t:"The dummy (declarer's partner)",correct:!0},{t:"Both defenders"},{t:"The dealer"}],exp:"After the opening lead, the dummy lays all 13 cards face-up, and the declarer plays both the dummy's hand and their own."},{type:"text",label:"Summary",body:"Bidding decides the contract and who declares; then declarer + dummy try to take the tricks they promised, while the two defenders try to stop them."}],bo3:[{type:"text",label:"Hook",body:"Bidding is a conversation in code. You and your partner describe your hands to each other \u2014 legally \u2014 to land in the best contract."},{type:"text",label:"Explanation \u2014 what a bid is",body:"A bid has a level (1\u20137) and a suit or notrump. The level tells you how many tricks you're promising: level + 6. So 1\u2660 promises 7 tricks, and 4\u2665 promises 10 tricks with hearts as trumps. The dealer bids first (the 'opener'); the auction goes clockwise."},{type:"text",label:"Explanation \u2014 ranking & ending",body:"Bids must go up in rank. Suits rank alphabetically: clubs (lowest), diamonds, hearts, spades, then notrump (highest). So 1NT outranks 1\u2660, which outranks 1\u2665. The auction ends when three players Pass in a row; the last bid becomes the contract. A bid you think is too high can be doubled, and that can be redoubled."},{type:"text",label:"Worked example",body:"North opens 1\u2665. East passes. South likes hearts and has strength, so raises to 4\u2665. Everyone passes. Contract: 4\u2665 \u2014 North-South must take 10 tricks (4 + 6) with hearts as trumps."},{type:"q",prompt:"Your side bids 4\u2660. How many tricks have you contracted to take?",options:[{t:"4"},{t:"10",correct:!0},{t:"6"},{t:"13"}],exp:"Tricks = level + 6. So 4\u2660 = 4 + 6 = 10 tricks, with spades as trumps."},{type:"text",label:"Summary",body:"A bid = level + suit/NT; tricks promised = level + 6; bids rise in rank (\u2663 < \u2666 < \u2665 < \u2660 < NT); three passes end the auction and set the contract."}],bo4:[{type:"text",label:"Hook",body:"Before you bid, you need to know how strong your hand is. Bridge players use a simple points system to size it up."},{type:"text",label:"Explanation \u2014 High Card Points",body:"Count High Card Points (HCP): Ace = 4, King = 3, Queen = 2, Jack = 1. There are 40 HCP in the whole pack, so an average hand is about 10. More than 10 means an above-average hand."},{type:"text",label:"Explanation \u2014 the two questions",body:"Bidding answers two questions. (1) How high should we go? \u2014 add your HCP to your partner's; if you both have above-average hands, aim for the game bonus. (2) What should be trumps? \u2014 look for a suit where your partnership holds at least eight cards between the two hands; that becomes your trump fit."},{type:"text",label:"Worked example",body:"You hold \u2660A K x x x, \u2665K Q x, \u2666x x, \u2663x x x. High cards: A(4)+K(3)+K(3)+Q(2) = 12 HCP \u2014 above average. You have five spades; if partner has three or more, that's an eight-card fit, so spades should be trumps."},{type:"q",prompt:"How many High Card Points is a King worth?",options:[{t:"4"},{t:"3",correct:!0},{t:"2"},{t:"1"}],exp:"A = 4, K = 3, Q = 2, J = 1. There are 40 HCP in the pack, so 10 is an average hand."},{type:"text",label:"Summary",body:"HCP (A4 K3 Q2 J1) measure strength \u2014 10 is average. Combine points with partner to decide how high, and hunt for an 8-card fit to decide the trump suit."}],bo5:[{type:"facets",items:[{k:"Plain language",body:"A trump is a 'boss' suit chosen for the deal: if you can't follow the suit led, a trump beats everything. Notrump means no boss suit \u2014 the highest card of the suit led just wins."},{k:"Formal definition",body:"In a trump contract the named suit outranks all others; a player void in the led suit may ruff (play a trump) and wins unless over-trumped. In a notrump contract, tricks are won solely by the highest card of the suit led."},{k:"Everyday analogy",body:"Trumps are like a wild 'boss' colour in Uno: even a small boss card beats a big ordinary one. Notrump is a plain game where only the led colour matters."},{k:"Common misconception",body:"Beginners think a high card always wins. It doesn't \u2014 if a player is void and trumps, even the \u26602 beats the \u2665A. And you can only win with a trump when you can't follow suit."}]}],bo6:[{type:"cards",items:[{f:"Trick",b:"One round of four cards; highest of the suit led (or highest trump) wins."},{f:"Trump",b:"The 'boss' suit for the deal; beats any card of the led suit."},{f:"Notrump (NT)",b:"A contract with no trump suit; highest card of the led suit wins."},{f:"Declarer",b:"The player who first named the final contract's suit; plays both hands."},{f:"Dummy",b:"Declarer's partner, who lays all 13 cards face-up after the opening lead."},{f:"Defenders",b:"The opposing pair, trying to stop the contract."},{f:"Opener",b:"The dealer, who makes the first call in the auction."},{f:"Contract",b:"The final bid: the tricks a side must take, and the trump suit (or NT)."},{f:"Level",b:"The 1\u20137 part of a bid; tricks promised = level + 6."},{f:"Opening lead",b:"The first card played, by the player to declarer's left."},{f:"High Card Points",b:"Hand strength: A=4, K=3, Q=2, J=1 (40 in the pack)."},{f:"Game bonus",b:"A big score for bidding & making 3NT, 4\u2665/4\u2660, or 5\u2663/5\u2666."}]}],bo7:[{type:"q",prompt:"How many tricks does a 3NT contract require?",options:[{t:"9",correct:!0},{t:"3"},{t:"10"},{t:"13"}],exp:"Level + 6 = 3 + 6 = 9 tricks. In notrump, nine tricks earns the game bonus."},{type:"q",prompt:"Spades are trump; hearts are led. A void player plays a low spade while others play high hearts. Who wins?",options:[{t:"The low spade (a trump)",correct:!0},{t:"The ace of hearts"},{t:"Nobody"},{t:"The dealer"}],exp:"A trump beats any card of the suit led \u2014 the boss suit wins."},{type:"q",prompt:"A Queen is worth how many High Card Points?",options:[{t:"2",correct:!0},{t:"4"},{t:"3"},{t:"1"}],exp:"A=4, K=3, Q=2, J=1."},{type:"q",prompt:"The auction ends when\u2026",options:[{t:"Three players Pass in a row",correct:!0},{t:"Someone bids 7NT"},{t:"Everyone has bid once"},{t:"The dealer says stop"}],exp:"Three passes in succession end the auction; the last bid becomes the contract."},{type:"q",prompt:"Which suit ranks highest in the bidding?",options:[{t:"Notrump",correct:!0},{t:"Spades"},{t:"Hearts"},{t:"Clubs"}],exp:"Ranking (low\u2192high): clubs, diamonds, hearts, spades, notrump."}],bo8:[{type:"text",label:"Section 1 \u2014 Set up",body:"You need four players, a 52-card deck, and a score pad. Sit across from your partner: North-South versus East-West. (For duplicate bridge you'll also see bidding boxes and boards.)"},{type:"text",label:"Section 2 \u2014 The auction",body:"Starting with the dealer and going clockwise, each player bids or passes. A bid names a level (1\u20137) and a suit or notrump and promises level + 6 tricks. Bids rise in rank (\u2663<\u2666<\u2665<\u2660<NT). Three passes in a row end the auction; the last bid is the contract."},{type:"text",label:"Section 3 \u2014 The play",body:"The player left of declarer makes the opening lead. Dummy lays out their 13 cards. Play 13 tricks: follow suit, highest of the led suit or highest trump wins, and the winner leads to the next trick."},{type:"text",label:"Section 4 \u2014 Scoring the deal",body:"If the declaring side takes at least the tricks it contracted for, it scores; if not, the defenders score. Bidding and making a game (3NT, 4\u2665/4\u2660, 5\u2663/5\u2666) earns a healthy bonus; six-level is a small slam, seven-level a grand slam."},{type:"q",prompt:"Who makes the opening lead?",options:[{t:"The player to the declarer's left",correct:!0},{t:"The declarer"},{t:"The dummy"},{t:"The dealer"}],exp:"The defender to declarer's left leads first; then the dummy's cards go face-up."},{type:"text",label:"Recap",body:"Deal \u2192 auction (bid level + strain, three passes to end) \u2192 opening lead \u2192 dummy down \u2192 13 tricks \u2192 score. Aim for a game contract when your combined hands are strong with an 8-card fit."}],bo9:[{type:"keypoints",items:["Two phases: the auction, then the play.","Tricks: follow suit; highest of led suit wins \u2014 unless trumped.","Trump = boss suit; notrump = no boss suit.","A bid = level (1\u20137) + suit/NT; tricks = level + 6.","Suit rank: \u2663 < \u2666 < \u2665 < \u2660 < NT. Three passes end the auction.","HCP: A4 K3 Q2 J1 (40 in the pack, ~10 average).","Aim for game with strong combined hands + an 8-card trump fit.","Declarer plays both hands; dummy is face-up; two defenders resist."]},{type:"text",label:"TL;DR",body:"Bid to describe your hand and set a contract (level + 6 tricks, choosing trumps or notrump), then win tricks with high cards and trumps. Strong pair + 8-card fit \u2192 go for the game bonus."}],bo10:[{type:"prompts",items:["You've just learned tricks and trumps. In your own words, explain to a friend why a lowly \u26602 can beat the \u2665A. When is that possible, and when is it not?","Think about the two questions bidding answers \u2014 'how high?' and 'what trump?'. For a hand with 12 HCP and five hearts, what would you be hoping your partner holds, and why?"]}],bo11:[{type:"text",label:"Setup",body:"You're the declarer. The auction landed you in a contract and the opening lead is made. Before you play a single card from dummy, make a plan \u2014 good players always do."},{type:"text",label:"Decision point 1 \u2014 a notrump contract",body:"You're in 3NT (need 9 tricks). What's the plan? \u2192 Count your sure tricks (winners you can take immediately without letting opponents in). Then don't rush to cash them \u2014 work to build the extra tricks you need first, and take them once you have enough."},{type:"text",label:"Decision point 2 \u2014 a suit contract",body:"You're in 4\u2665 (need 10 tricks, hearts trump). What's the plan? \u2192 Count your losers (cards that would lose if you just played from the top). Work out how to get rid of them \u2014 and consider drawing trumps (pulling the opponents' trumps) so they can't ruff your winners."},{type:"text",label:"Debrief",body:"Notrump: count winners, build more, then cash. Suit: count losers, remove them, draw trumps. The habit that separates beginners from intermediates is pausing to plan before playing to trick one."}],bo12:[{type:"text",label:"Task brief",body:"In ~250 words, pick any contract (e.g. 4\u2665 or 3NT) and explain to a beginner what it means: how many tricks it promises, whether there's a trump suit, and what the declaring side must do to make it. Cite the guide."},{type:"text",label:"Requirements",body:"\u2022 State the tricks required using level + 6.  \u2022 Say what the trump suit is (or that it's notrump) and what that changes.  \u2022 Name the roles: declarer, dummy, defenders.  \u2022 Give one sentence of play strategy for that contract type."},{type:"text",label:"Rubric",body:"Correct trick count (3) \xB7 Correct trump/NT explanation (3) \xB7 Roles named accurately (2) \xB7 Clear beginner-friendly strategy + citation (2)."}],bo13:[{type:"cards",items:[{f:"1\u2660 \u2192 ? tricks",b:"7 (1 + 6)."},{f:"3NT \u2192 ? tricks",b:"9 \u2014 the notrump game."},{f:"4\u2665 \u2192 ? tricks",b:"10 \u2014 a major-suit game."},{f:"5\u2666 \u2192 ? tricks",b:"11 \u2014 a minor-suit game."},{f:"6\u2660 \u2192 ? tricks",b:"12 \u2014 a small slam."},{f:"7NT \u2192 ? tricks",b:"13 \u2014 a grand slam, every trick."}]}],bo14:[{type:"text",label:"Hook",body:"The opener speaks first \u2014 and that first bid tells your partner a lot. Here's the beginner's rule of thumb."},{type:"text",label:"Explanation",body:"The dealer opens the auction. With roughly an above-average han
